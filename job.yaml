apiVersion: batch/v1
kind: Job
metadata:
  name: hotdog-v1-1772691741
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      nodeSelector:
        nvidia.com/gpu.product: Tesla-T4
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 2Gi
      containers:
      - name: train
        image: chambie0102/chamber-hotdog-demo:v1
        command: ["python", "train.py"]
        env:
        - name: BATCH_SIZE
          value: "64"
        - name: LEARNING_RATE
          value: "0.001"
        - name: EPOCHS
          value: "10"
        - name: DROPOUT
          value: "0.0"
        - name: USE_CLASS_WEIGHTS
          value: "false"
        - name: AUGMENTATION
          value: "none"
        - name: WARMUP_EPOCHS
          value: "0"
        - name: NUM_WORKERS
          value: "2"
        - name: WEIGHT_DECAY
          value: "0.0"
        - name: WANDB_API_KEY
          value: "2209d0bfd8c58170e10a1e9a41be9bbc2f8aed0c"
        - name: WANDB_PROJECT
          value: "chamber-hotdog-demo"
        - name: WANDB_ENTITY
          value: "jasonong-chamberai"
        - name: HF_HOME
          value: "/tmp/hf_cache"
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"
            nvidia.com/gpu: 1
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
