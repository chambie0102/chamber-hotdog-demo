# v1: CUDA OOM — batch 512 on T4. Fails in ~30s.
apiVersion: batch/v1
kind: Job
metadata:
  name: hotdog-v1-run-20260312-233823
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      nodeSelector:
        nvidia.com/gpu.product: Tesla-T4
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 2Gi
      containers:
      - name: train
        image: chambie0102/chamber-hotdog-demo:run-20260312-233823
        command: ["python", "train.py"]
        env:
        - name: BATCH_SIZE
          value: "512"
        - name: LEARNING_RATE
          value: "1e-3"
        - name: EPOCHS
          value: "5"
        - name: AUGMENTATION
          value: "none"
        - name: OPTIMIZER
          value: "adam"
        - name: NUM_WORKERS
          value: "2"
        - name: WANDB_PROJECT
          value: "chamber-hotdog"
        - name: WANDB_ENTITY
          value: "jasonong-chamberai"
        - name: WANDB_API_KEY
          value: "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"
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"
            nvidia.com/gpu: 1
