# v3: Tuned — AdamW + aug + warmup + class weights → should hit 95%+
apiVersion: batch/v1
kind: Job
metadata:
  name: hotdog-v3
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      nodeSelector:
        nvidia.com/gpu.product: Tesla-T4
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 2Gi
      containers:
      - name: train
        image: chambie0102/chamber-hotdog-demo:v1
        command: ["python", "train.py"]
        env:
        - name: BATCH_SIZE
          value: "64"
        - name: LEARNING_RATE
          value: "1e-3"
        - name: EPOCHS
          value: "5"
        - name: AUGMENTATION
          value: "basic"
        - name: OPTIMIZER
          value: "adamw"
        - name: USE_CLASS_WEIGHTS
          value: "true"
        - name: WARMUP_EPOCHS
          value: "1"
        - name: NUM_WORKERS
          value: "4"
        - name: WANDB_PROJECT
          value: "chamber-hotdog"
        - name: WANDB_ENTITY
          value: "jasonong-chamberai"
        - name: WANDB_API_KEY
          value: "WANDB_KEY_PLACEHOLDER"
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"
            nvidia.com/gpu: 1
